name: Release module

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate package
        run: npm test
      - name: Verify tag matches manifest
        run: |
          node -e "const m=require('./module.json'); if ('v'+m.version !== process.env.GITHUB_REF_NAME) process.exit(1)"
      - name: Build module archive
        run: zip -r module.zip module.json LICENSE scripts styles lang
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" module.zip module.json --generate-notes --title "$GITHUB_REF_NAME"
